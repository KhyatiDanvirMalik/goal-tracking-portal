# render.yaml - deploy both services from one file
# Place this at the ROOT of your repo

services:

  # ─── BACKEND ───────────────────────────────────────────────
  - type: web
    name: goal-tracking-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: CLIENT_URL
        sync: false          # set to your frontend Render URL
      - key: DB_HOST
        sync: false          # from Railway → MySQL → Variables
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: railway
      - key: DB_SSL
        value: true
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 200

  # ─── FRONTEND ──────────────────────────────────────────────
  - type: web
    name: goal-tracking-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # set to your backend Render URL + /api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
